name: Build Release

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: tls-proxy

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"

      - name: Build Linux x64
        run: |
          source "$HOME/.cargo/env"
          cargo build --release
          mkdir -p dist
          cp target/release/${BINARY_NAME} dist/${BINARY_NAME}-linux-x64
          strip dist/${BINARY_NAME}-linux-x64 || true
          ls -la dist/

      # Only upload on GitHub, skip locally
      - name: Upload Linux artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: tls-proxy-linux-x64
          path: dist/tls-proxy-linux-x64

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustup target add x86_64-pc-windows-gnu

      - name: Build Windows x64
        run: |
          source "$HOME/.cargo/env"
          cargo build --release --target x86_64-pc-windows-gnu
          mkdir -p dist
          cp target/x86_64-pc-windows-gnu/release/${BINARY_NAME}.exe dist/${BINARY_NAME}-windows-x64.exe
          ls -la dist/

      - name: Upload Windows artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: tls-proxy-windows-x64
          path: dist/tls-proxy-windows-x64.exe

  build-macos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Install Zig Toolchain
        # We download Zig manually so it works in 'act' and GitHub Actions reliably
        run: |
          sudo apt-get update
          sudo apt-get install -y wget xz-utils
          
          # Download Zig 0.13.0 (Stable)
          wget -q https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz
          tar -xf zig-linux-x86_64-0.13.0.tar.xz
          
          # Move to a global location
          sudo mv zig-linux-x86_64-0.13.0 /usr/local/zig
          
          # Add to Path for subsequent steps
          echo "/usr/local/zig" >> $GITHUB_PATH

      - name: Install cargo-zigbuild
        run: |
          source "$HOME/.cargo/env"
          cargo install cargo-zigbuild

      - name: Build macOS x64
        run: |
          source "$HOME/.cargo/env"
          # Use zigbuild instead of 'cargo build' or 'cross'
          cargo zigbuild --release --target x86_64-apple-darwin
          mkdir -p dist
          cp target/x86_64-apple-darwin/release/${BINARY_NAME} dist/${BINARY_NAME}-macos-x64

      - name: Build macOS ARM64
        run: |
          source "$HOME/.cargo/env"
          cargo zigbuild --release --target aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/${BINARY_NAME} dist/${BINARY_NAME}-macos-arm64
          ls -la dist/

      - name: Upload macOS x64
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: tls-proxy-macos-x64
          path: dist/tls-proxy-macos-x64

      - name: Upload macOS ARM64
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: tls-proxy-macos-arm64
          path: dist/tls-proxy-macos-arm64

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"

      - name: Run tests
        run: |
          source "$HOME/.cargo/env"
          cargo test --verbose